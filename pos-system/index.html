<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .section {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h1, h2 {
            color: #333;
            margin-bottom: 20px;
        }

        h1 {
            grid-column: 1 / -1;
            text-align: center;
            color: white;
            font-size: 2.5em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="date"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: #667eea;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            background: #764ba2;
        }

        button.secondary {
            background: #ff6b6b;
            margin-top: 5px;
        }

        button.secondary:hover {
            background: #ee5a52;
        }

        .product-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .product-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .product-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .product-name {
            font-weight: 600;
            color: #333;
        }

        .product-price {
            color: #667eea;
            font-weight: 600;
        }

        .product-stock {
            color: #666;
            font-size: 12px;
        }

        .product-actions {
            display: flex;
            gap: 5px;
        }

        .product-actions button {
            flex: 1;
            padding: 6px;
            margin: 0;
            font-size: 12px;
        }

        .cart-item {
            background: #e7f3ff;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            border-left: 4px solid #40c057;
        }

        .cart-summary {
            background: #f1f3f5;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .summary-row.total {
            font-size: 18px;
            color: #667eea;
            border-top: 2px solid #ddd;
            padding-top: 8px;
        }

        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .report-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .report-table th {
            background: #667eea;
            color: white;
            padding: 10px;
            text-align: left;
        }

        .report-table td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .report-table tr:nth-child(even) {
            background: #f8f9fa;
        }

        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <h1>💳 Point of Sale System</h1>

    <div class="container">
        <!-- Product Management -->
        <div class="section">
            <h2>📦 Product Management</h2>
            <div id="productAlert"></div>

            <div>
                <h3 style="font-size: 16px; margin: 15px 0 10px;">Add New Product</h3>
                <input type="text" id="productName" placeholder="Product Name">
                <input type="number" id="productPrice" placeholder="Price" step="0.01" min="0">
                <input type="number" id="productStock" placeholder="Stock Quantity" min="0">
                <button onclick="addProduct()">Add Product</button>
            </div>

            <h3 style="font-size: 16px; margin: 20px 0 10px;">Available Products</h3>
            <div class="product-list" id="productList">
                <p style="color: #999;">No products yet</p>
            </div>
        </div>

        <!-- Point of Sale -->
        <div class="section">
            <h2>🛒 Sales Point</h2>
            <div id="saleAlert"></div>

            <div>
                <label>Select Product</label>
                <select id="saleProduct">
                    <option value="">-- Choose Product --</option>
                </select>
            </div>

            <div>
                <label>Quantity</label>
                <input type="number" id="saleQuantity" value="1" min="1">
            </div>

            <button onclick="addToCart()">Add to Cart</button>

            <h3 style="font-size: 16px; margin: 20px 0 10px;">Shopping Cart</h3>
            <div id="cartItems"></div>

            <div class="cart-summary">
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="subtotal">₱0.00</span>
                </div>
                <div class="summary-row">
                    <span>Discount (%):</span>
                    <input type="number" id="discountPercent" value="0" min="0" max="100" style="width: 80px; padding: 5px;">
                </div>
                <div class="summary-row">
                    <span>Discount Amount:</span>
                    <span id="discountAmount">₱0.00</span>
                </div>
                <div class="summary-row">
                    <span>Tax (12%):</span>
                    <span id="taxAmount">₱0.00</span>
                </div>
                <div class="summary-row total">
                    <span>TOTAL:</span>
                    <span id="totalAmount">₱0.00</span>
                </div>
            </div>

            <div class="two-col">
                <button onclick="generateReceipt()" style="background: #40c057;">Checkout</button>
                <button onclick="clearCart()" class="secondary">Clear Cart</button>
            </div>
        </div>

        <!-- Daily Report -->
        <div class="section">
            <h2>📊 Daily Sales Report</h2>
            <div>
                <label>Select Date</label>
                <input type="date" id="reportDate" value="">
                <button onclick="generateDailyReport()">Generate Report</button>
            </div>

            <div id="reportContent" style="margin-top: 20px;"></div>
        </div>

        <!-- Sales Summary -->
        <div class="section">
            <h2>💰 Total Sales</h2>
            <button onclick="getTotalSales()">Get Total Sales</button>
            <div id="totalSalesContent" style="margin-top: 20px;"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api';
        let cart = [];

        // Set today's date as default
        document.getElementById('reportDate').valueAsDate = new Date();

        // Load products on startup
        loadProducts();

        // Add event listener for discount calculation
        document.getElementById('discountPercent').addEventListener('change', updateCartTotals);

        async function loadProducts() {
            try {
                const response = await fetch(`${API_BASE}/products`);
                const products = await response.json();
                displayProducts(products || []);
                updateProductSelect(products || []);
            } catch (error) {
                console.error('Error loading products:', error);
            }
        }

        function displayProducts(products) {
            const list = document.getElementById('productList');
            if (!products || products.length === 0) {
                list.innerHTML = '<p style="color: #999;">No products yet</p>';
                return;
            }

            list.innerHTML = products.map(p => `
                <div class="product-item">
                    <div class="product-info">
                        <span class="product-name">${p.name}</span>
                        <span class="product-price">₱${p.price.toFixed(2)}</span>
                    </div>
                    <div class="product-stock">Stock: ${p.stock} units</div>
                    <div class="product-actions">
                        <button onclick="removeProduct(${p.id})" class="secondary">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function updateProductSelect(products) {
            const select = document.getElementById('saleProduct');
            select.innerHTML = '<option value="">-- Choose Product --</option>';
            products.forEach(p => {
                select.innerHTML += `<option value="${p.id}" data-price="${p.price}" data-stock="${p.stock}">
                    ${p.name} (₱${p.price.toFixed(2)}) - Stock: ${p.stock}
                </option>`;
            });
        }

        async function addProduct() {
            const name = document.getElementById('productName').value;
            const price = parseFloat(document.getElementById('productPrice').value);
            const stock = parseInt(document.getElementById('productStock').value);

            if (!name || !price || stock < 0) {
                showAlert('productAlert', 'Please fill all fields correctly', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/products`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, price, stock })
                });

                if (response.ok) {
                    showAlert('productAlert', 'Product added successfully', 'success');
                    document.getElementById('productName').value = '';
                    document.getElementById('productPrice').value = '';
                    document.getElementById('productStock').value = '';
                    loadProducts();
                }
            } catch (error) {
                showAlert('productAlert', 'Error adding product', 'error');
            }
        }

        async function removeProduct(id) {
            if (!confirm('Are you sure?')) return;

            try {
                await fetch(`${API_BASE}/products/remove`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ product_id: id })
                });
                loadProducts();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function addToCart() {
            const select = document.getElementById('saleProduct');
            const quantity = parseInt(document.getElementById('saleQuantity').value);

            if (!select.value) {
                showAlert('saleAlert', 'Please select a product', 'error');
                return;
            }

            const selectedOption = select.options[select.selectedIndex];
            const price = parseFloat(selectedOption.dataset.price);
            const stock = parseInt(selectedOption.dataset.stock);

            if (quantity > stock) {
                showAlert('saleAlert', `Only ${stock} units available`, 'error');
                return;
            }

            const cartItem = {
                productId: select.value,
                productName: selectedOption.text.split(' (')[0],
                quantity: quantity,
                unitPrice: price,
                amount: price * quantity
            };

            cart.push(cartItem);
            updateCart();
            select.value = '';
            document.getElementById('saleQuantity').value = '1';
        }

        function updateCart() {
            const cartDiv = document.getElementById('cartItems');
            if (cart.length === 0) {
                cartDiv.innerHTML = '<p style="color: #999;">Cart is empty</p>';
            } else {
                cartDiv.innerHTML = cart.map((item, idx) => `
                    <div class="cart-item">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <strong>${item.productName}</strong><br>
                                ${item.quantity} × ₱${item.unitPrice.toFixed(2)} = ₱${item.amount.toFixed(2)}
                            </div>
                            <button onclick="removeFromCart(${idx})" class="secondary" style="width: 60px; padding: 5px;">Remove</button>
                        </div>
                    </div>
                `).join('');
            }
            updateCartTotals();
        }

        function removeFromCart(idx) {
            cart.splice(idx, 1);
            updateCart();
        }

        function updateCartTotals() {
            const subtotal = cart.reduce((sum, item) => sum + item.amount, 0);
            const discountPercent = parseFloat(document.getElementById('discountPercent').value) || 0;
            const discountAmount = subtotal * (discountPercent / 100);
            const afterDiscount = subtotal - discountAmount;
            const tax = afterDiscount * 0.12;
            const total = afterDiscount + tax;

            document.getElementById('subtotal').textContent = '₱' + subtotal.toFixed(2);
            document.getElementById('discountAmount').textContent = '₱' + discountAmount.toFixed(2);
            document.getElementById('taxAmount').textContent = '₱' + tax.toFixed(2);
            document.getElementById('totalAmount').textContent = '₱' + total.toFixed(2);
        }

        async function generateReceipt() {
            if (cart.length === 0) {
                showAlert('saleAlert', 'Cart is empty', 'error');
                return;
            }

            const discount = cart.reduce((sum, item) => sum + item.amount, 0) * (parseFloat(document.getElementById('discountPercent').value) || 0) / 100;

            try {
                const response = await fetch(`${API_BASE}/receipt`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        items: cart,
                        discount: discount
                    })
                });

                const receipt = await response.json();
                printReceipt(receipt);
                clearCart();
                loadProducts();
            } catch (error) {
                showAlert('saleAlert', 'Error processing transaction', 'error');
            }
        }

        function printReceipt(receipt) {
            let receiptText = `
RECEIPT #${receipt.id}
${new Date(receipt.datetime).toLocaleString()}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
Items:
`;
            receipt.items.forEach(item => {
                receiptText += `${item.product_name} × ${item.quantity} @ ₱${item.unit_price.toFixed(2)} = ₱${item.amount.toFixed(2)}\n`;
            });

            receiptText += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
Subtotal:  ₱${receipt.total.toFixed(2)}
Discount:  ₱${receipt.discount.toFixed(2)}
Tax(12%):  ₱${receipt.tax.toFixed(2)}
TOTAL:     ₱${receipt.net_total.toFixed(2)}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
Thank you for your purchase!`;

            alert(receiptText);
        }

        function clearCart() {
            cart = [];
            updateCart();
            document.getElementById('discountPercent').value = '0';
        }

        async function generateDailyReport() {
            const date = document.getElementById('reportDate').value;
            try {
                const response = await fetch(`${API_BASE}/sales/daily?date=${date}`);
                const report = await response.json();

                let html = `
                    <h3>${new Date(date).toLocaleDateString()}</h3>
                    <div class="summary-row">
                        <span>Total Transactions:</span>
                        <span>${report.total_transactions}</span>
                    </div>
                    <div class="summary-row">
                        <span>Total Sales:</span>
                        <span>₱${report.total_sales_amount.toFixed(2)}</span>
                    </div>
                `;

                if (report.transaction_details && report.transaction_details.length > 0) {
                    html += `<table class="report-table">
                        <tr>
                            <th>Product ID</th>
                            <th>Quantity</th>
                            <th>Amount</th>
                            <th>Time</th>
                        </tr>`;

                    report.transaction_details.forEach(t => {
                        html += `<tr>
                            <td>${t.product_id}</td>
                            <td>${t.quantity}</td>
                            <td>₱${t.amount.toFixed(2)}</td>
                            <td>${new Date(t.timestamp).toLocaleTimeString()}</td>
                        </tr>`;
                    });

                    html += '</table>';
                }

                document.getElementById('reportContent').innerHTML = html;
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function getTotalSales() {
            try {
                const response = await fetch(`${API_BASE}/sales/total`);
                const data = await response.json();
                document.getElementById('totalSalesContent').innerHTML = `
                    <div class="summary-row total">
                        <span>All-Time Total Sales:</span>
                        <span>₱${data.total_sales.toFixed(2)}</span>
                    </div>
                `;
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function showAlert(elementId, message, type) {
            const alert = document.getElementById(elementId);
            alert.innerHTML = `<div class="alert ${type}">${message}</div>`;
            setTimeout(() => alert.innerHTML = '', 3000);
        }
    </script>
</body>
</html>
